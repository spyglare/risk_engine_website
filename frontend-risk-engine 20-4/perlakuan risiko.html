<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perlakuan Risiko</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 text-xs">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-blue-800 text-white flex flex-col p-6 space-y-6">
    <a href="index.html">Home</a>
    <a href="asesmen risiko.html">Asesmen Risiko</a>
    <a href="perlakuan risiko.html" class="font-bold underline">Perlakuan Risiko</a>
  </div>

  <!-- Content -->
  <div class="flex-1 p-4">

    <h2 class="text-blue-700 font-bold">PT BIO FARMA (Persero) TBK</h2>
    <h1 class="text-lg font-bold text-blue-900 mb-3">PERLAKUAN RISIKO</h1>

    <div class="overflow-x-auto bg-white border">

      <table class="w-full border-collapse text-xs">

        <!-- HEADER -->
        <thead class="bg-gray-300 text-center">
          <tr>
            <th rowspan="2" class="border p-2">NO</th>
            <th rowspan="2" class="border p-2">NOMOR RISIKO</th>
            <th rowspan="2" class="border p-2">RISIKO</th>
            <th rowspan="2" class="border p-2">PROB</th>
            <th rowspan="2" class="border p-2">DAMPAK</th>
            <th rowspan="2" class="border p-2">OPSI</th>

            <th colspan="3" class="border p-2">PENANGANAN RISIKO</th>
            <th colspan="3" class="border p-2">RESIDUAL</th>

            <th rowspan="2" class="border p-2">➡</th>
          </tr>

          <tr>
            <th class="border p-2">Strategi</th>
            <th class="border p-2">Deskripsi</th>
            <th class="border p-2">Biaya</th>

            <th class="border p-2">Kerugian</th>
            <th class="border p-2">Residual</th>
            <th class="border p-2">Nilai</th>
          </tr>
        </thead>

          <tbody id="tempat-data-perlakuan" class="bg-white">

          </tbody>

      </table>

</table>
    </div>
  </div>
</div>

<script>
  const tempatData = document.getElementById('tempat-data-perlakuan');

  // 1. Fungsi Utama: Tarik Data Risiko beserta Strateginya
  async function tarikData() {
    try {
      // Tarik data utama
      const balasan = await fetch('http://localhost:5000/api/risiko');
      const dataRisiko = await balasan.json();
      tempatData.innerHTML = '';

      for (let index = 0; index < dataRisiko.length; index++) {
        const risiko = dataRisiko[index];
        
        // Tarik data strategi khusus untuk nomor risiko ini (Dari Loket H)
        const balasanStrategi = await fetch(`http://localhost:5000/api/penanganan/${risiko.nomor_risiko}`);
        const dataStrategi = await balasanStrategi.json();

        // Tentukan rowspan (berapa baris sel ini digabung)
        // Minimal 2 (1 untuk form tambah strategi, 1 untuk minimal 1 strategi yang ada)
        const totalBaris = dataStrategi.length > 0 ? dataStrategi.length + 1 : 2;

        const barisUtama = document.createElement('tr');
        barisBaruHTML(barisUtama, risiko, index, totalBaris, dataStrategi);
        tempatData.appendChild(barisUtama);

        // Cetak baris-baris strategi yang sudah ada di database
        dataStrategi.forEach(strat => {
          const barisStrategi = document.createElement('tr');
          barisStrategi.innerHTML = `
            <td class="border p-2 font-semibold text-blue-700">${strat.strategi}</td>
            <td class="border p-2">${strat.deskripsi}</td>
            <td class="border p-2 text-right">Rp ${parseInt(strat.biaya).toLocaleString('id-ID')}</td>
          `;
          tempatData.appendChild(barisStrategi);
        });

        // Cetak 1 baris khusus untuk Form Tambah Strategi Baru
        const barisForm = document.createElement('tr');
        barisForm.className = "bg-gray-50";
        barisForm.innerHTML = `
          <td class="border p-1">
            <select id="strat_${risiko.nomor_risiko}" class="w-full border p-1 rounded">
              <option value="CEGAH">CEGAH</option>
              <option value="MITIGASI">MITIGASI</option>
            </select>
          </td>
          <td class="border p-1">
            <input type="text" id="desc_strat_${risiko.nomor_risiko}" class="w-full border p-1 rounded" placeholder="Ketik deskripsi...">
          </td>
          <td class="border p-1 flex items-center space-x-1">
            <input type="number" id="biaya_strat_${risiko.nomor_risiko}" class="w-full border p-1 rounded" placeholder="Biaya (Rp)...">
            <button onclick="tambahStrategi('${risiko.nomor_risiko}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold hover:bg-blue-700">
              + Add
            </button>
          </td>
        `;
        tempatData.appendChild(barisForm);
      }
    } catch (error) { console.error("Gagal menarik data:", error); }
  }

  // Bagian Template Baris Utama (Agar kode lebih rapi)
  function barisBaruHTML(elemen, risiko, index, totalBaris, dataStrategi) {
    elemen.innerHTML = `
      <td rowspan="${totalBaris}" class="border p-2 text-center bg-white">${index + 1}</td>
      <td rowspan="${totalBaris}" class="border p-2 text-center font-bold bg-white">${risiko.nomor_risiko}</td>
      <td rowspan="${totalBaris}" class="border p-2 bg-white">${risiko.kejadian_berisiko}</td>
      <td rowspan="${totalBaris}" class="border p-2 text-center bg-white">${risiko.probabilitas_awal ? Math.round(risiko.probabilitas_awal * 100) + '%' : '-'}</td>
      <td rowspan="${totalBaris}" class="border p-2 text-right bg-white">Rp ${parseInt(risiko.dampak_awal).toLocaleString('id-ID')}</td>
      <td rowspan="${totalBaris}" class="border p-2 text-center bg-white">-</td>
      
      `;
    
    // Jika belum ada strategi sama sekali, kita buat baris "Kosong"
    if(dataStrategi.length === 0) {
       elemen.innerHTML += `
        <td class="border p-2 italic text-gray-400 text-center">-</td>
        <td class="border p-2 italic text-gray-400 text-center">Belum ada strategi</td>
        <td class="border p-2 italic text-gray-400 text-center">-</td>
       `;
    }

    elemen.innerHTML += `
      <td rowspan="${totalBaris}" class="border p-2 bg-white">
        <input type="text" id="prob_setelah_${risiko.nomor_risiko}" class="w-full border p-1 rounded text-center" placeholder="Prob..." value="${risiko.probabilitas_setelah || ''}">
      </td>
      <td rowspan="${totalBaris}" class="border p-2 bg-white">
          <input type="text" id="status_setelah_${risiko.nomor_risiko}" class="w-full border p-1 rounded text-center" placeholder="Status..." value="${risiko.status_setelah || ''}">
      </td>
      <td rowspan="${totalBaris}" class="border p-2 bg-white">
          <input type="number" id="dampak_setelah_${risiko.nomor_risiko}" class="w-full border p-1 rounded text-right" placeholder="Dampak..." value="${risiko.dampak_setelah || ''}">
      </td>
      <td rowspan="${totalBaris}" class="border p-2 text-center bg-white">
        <button onclick="simpanResidual('${risiko.nomor_risiko}')" class="bg-green-600 text-white text-xs font-bold px-3 py-2 rounded shadow hover:bg-green-700 w-full mb-1">💾 Residual</button>
      </td>
    `;
  }

  // 2. Fungsi Menambah Strategi Baru ke Loket G
  async function tambahStrategi(nomor) {
    const strategi = document.getElementById(`strat_${nomor}`).value;
    const deskripsi = document.getElementById(`desc_strat_${nomor}`).value;
    const biaya = document.getElementById(`biaya_strat_${nomor}`).value;

    if(!deskripsi) return alert("Deskripsi strategi tidak boleh kosong!");

    const dataKirim = {
      nomor_risiko: nomor,
      strategi: strategi,
      deskripsi: deskripsi,
      biaya: parseInt(biaya) || 0
    };

    try {
      const respon = await fetch('http://localhost:5000/api/penanganan', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataKirim)
      });
      if(respon.ok) {
        tarikData(); // Refresh tabel otomatis
      } else { alert("Gagal menambah strategi"); }
    } catch (error) { alert("Error server!"); }
  }

  // 3. Fungsi Menyimpan Residual (Loket F)
  async function simpanResidual(nomor) {
    const dataUpdate = {
      // Kita kosongkan deskripsi penanganan utama, karena sekarang kita pakai tabel t_penanganan
      deskripsi_penanganan: "Lihat rincian strategi", 
      probabilitas_setelah: parseFloat(document.getElementById(`prob_setelah_${nomor}`).value) || 0,
      dampak_setelah: parseInt(document.getElementById(`dampak_setelah_${nomor}`).value) || 0,
      status_setelah: document.getElementById(`status_setelah_${nomor}`).value
    };

    try {
      const respon = await fetch(`http://localhost:5000/api/risiko/${nomor}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataUpdate)
      });
      if (respon.ok) alert(`Residual berhasil disimpan!`); 
    } catch (error) { alert("Error server!"); }
  }

  tarikData();
</script>

</body>
</html>
