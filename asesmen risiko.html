<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Asesmen Risiko</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-xs">

<div class="flex">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-blue-800 text-white min-h-screen p-6 text-sm">
    <nav class="flex flex-col space-y-6">
      <a href="index.html" class="hover:underline">Home</a>
      <a href="#" class="font-bold underline">Asesmen Risiko</a>
      <a href="#" class="hover:underline">Perlakuan Risiko</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-6 overflow-x-auto">

    <!-- HEADER -->
    <div class="flex justify-between mb-4">
      <div>
        <p class="text-blue-600 font-bold">PT BIO FARMA (Persero) TBK</p>
        <h1 class="text-xl font-bold">ASESMEN RISIKO</h1>
      </div>

      <div class="flex-1 flex justify-center">
        <table class="text-sm text-center">
          <tr><td class="pr-2">SATUAN KERJA</td><td>: Bagian Pemasaran</td></tr>
          <tr><td>PERIODE RISIKO</td><td>: 2026</td></tr>
          <tr><td>ANGGARAN</td><td>: Rp2,400,000,000</td></tr>
        </table>
      </div>
    </div>

    <!-- TABEL ASESMENT -->
    <table id="asesmenTable" class="border-collapse border border-black w-full">
      <thead class="bg-gray-200 text-center">
        <tr>
          <th rowspan="2" class="border">No</th>
          <th rowspan="2" class="border">KPI (SASARAN)</th>
          <th rowspan="2" class="border">PROSES BISNIS</th>
          <th rowspan="2" class="border">RISIKO</th>
          <th colspan="2" class="border">AKIBAT</th>
          <th rowspan="2" class="border">AKTIVITAS</th>
          <th colspan="3" class="border">DATA KERUGIAN</th>
          <th colspan="2" class="border">STATUS</th>
          <th rowspan="2" class="border">Aksi</th>
        </tr>
        <tr>
          <th class="border">Satuan</th>
          <th class="border">Bentuk</th>
          <th class="border">Estimasi</th>
          <th class="border">Rate</th>
          <th class="border">Estimasi 10 th</th>
          <th class="border">Prob.</th>
          <th class="border">Dampak</th>
        </tr>
      </thead>

      <tbody id="asesmenBody"></tbody>
    </table>

    <!-- BUTTON -->
    <button onclick="addRowAsesmen()"
      class="mt-3 px-4 py-1 bg-blue-700 text-white">
      + Add Baris
    </button>

  </main>
</div>

<script>
const kpiData = JSON.parse(localStorage.getItem('kpi')) || [];
const prosesData = JSON.parse(localStorage.getItem('proses')) || [];
const aktivitasData = JSON.parse(localStorage.getItem('aktivitas')) || [];

function optionList(data) {
  return '<option></option>' + data.map(v => `<option>${v}</option>`).join('');
}

function addRowAsesmen() {
  const tbody = document.getElementById('asesmenBody');
  const rowCount = tbody.children.length + 1;

  const tr = document.createElement('tr');
  tr.className = 'h-28 align-top';

  tr.innerHTML = `
    <td class="border text-center">${rowCount}</td>

    <td class="border p-1">
      <select class="w-full">${optionList(kpiData)}</select>
    </td>

    <td class="border p-1">
      <select class="w-full">${optionList(prosesData)}</select>
    </td>

    <td class="border p-2" contenteditable></td>

    <td class="border p-1">
      <select class="w-full">
        <option>Rp</option>
        <option>Kuantitas</option>
        <option>Waktu</option>
        <option>Area</option>
      </select>
    </td>

    <td class="border p-2" contenteditable></td>

    <td class="border p-1">
      <select class="w-full">${optionList(aktivitasData)}</select>
    </td>

    <td class="border p-2" contenteditable></td>
    <td class="border p-2" contenteditable></td>
    <td class="border p-2" contenteditable></td>
    <td class="border p-2" contenteditable></td>
    <td class="border p-2" contenteditable></td>

    <td class="border text-center">
      <button onclick="this.closest('tr').remove(); updateNo();"
        class="text-red-600 font-bold">✕</button>
    </td>
  `;

  tbody.appendChild(tr);
}

function updateNo() {
  document.querySelectorAll('#asesmenBody tr').forEach((tr, i) => {
    tr.children[0].innerText = i + 1;
  });
}

// buat 1 baris awal
addRowAsesmen();
</script>

</body>
</html>
